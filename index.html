<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project ATL — Antipolo TODA Map</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23C2410C'/%3E%3Ctext y='24' x='4' font-size='22'%3E🛺%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

  <style>
    :root {
      --accent: #F97316;
      --accent-d: #C2410C;
      --accent-l: #FB923C;
      --bg: #1c120a;
      --bg-mid: #26160c;
      --bg-light: #3a2212;
      --border: #6b3d1c;
      --text: #fff4e6;
      --muted: #d0a373;
      --yellow: #F5C842;
      --confirmed: #42A5F5;
      --draft: #F5C842;
      --kolorum: #e53935;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

    /* Topbar */
    #topbar{position:fixed;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--accent-d);border-bottom:1px solid #9a3412;z-index:1000;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;color:white;}
    .topbar-right{display:flex;align-items:center;gap:8px;}

    /* Dark Map */
    #map{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:1;}
    .leaflet-tile-container img {filter: brightness(0.92) contrast(1.08) saturate(0.95);}

    /* Panel */
    #panel{
      position:fixed;top:62px;right:12px;bottom:12px;width:360px;
      background:rgba(28,18,10,0.95);backdrop-filter:blur(20px);
      border:1px solid rgba(249,115,22,0.4);border-radius:16px;
      display:flex;flex-direction:column;overflow:hidden;z-index:900;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    #panel-logo{
      height:100px;background:var(--bg-light);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    #panel-logo-img{max-height:90%;max-width:90%;object-fit:contain;display:none;}
    .logo-placeholder{font-size:3rem;opacity:0.15;}

    #panel-header{padding:12px 16px;border-bottom:1px solid var(--border);}
    .panel-num{font-family:'IBM Plex Mono',monospace;background:var(--accent);color:#000;padding:2px 8px;border-radius:4px;font-weight:700;}
    
    #panel-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}

    .detail-row{margin-bottom:12px;}
    .detail-label{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;letter-spacing:0.05em;color:var(--muted);text-transform:uppercase;}
    .detail-value{font-size:0.95rem;line-height:1.4;}

    .swatch{display:inline-block;width:20px;height:20px;border-radius:50%;border:2px solid white;margin-right:6px;}

    button{cursor:pointer;}
    .btn-primary{background:var(--accent);color:white;border:none;padding:10px 16px;border-radius:6px;font-weight:700;}
  </style>
</head>
<body>

<div id="topbar">
  <a href="#" class="logo">Project <span style="color:#FB923C">ATL</span></a>
  <div class="topbar-right">
    <select id="city-filter" style="background:#26160c;color:white;border:1px solid #6b3d1c;padding:6px 10px;border-radius:6px;">
      <option value="Antipolo">Antipolo City</option>
      <option value="All">All Areas</option>
    </select>
    <button onclick="openAdminModal()" class="btn-primary">Admin</button>
  </div>
</div>

<div id="map"></div>

<!-- Detail Panel -->
<div id="panel">
  <div id="panel-logo">
    <div id="panel-logo-placeholder" class="logo-placeholder">🛺</div>
    <img id="panel-logo-img" alt="TODA Logo">
    <button id="panel-close" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:white;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;">✕</button>
  </div>
  
  <div id="panel-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="panel-num" class="panel-num">#00</span>
      <span id="panel-name" style="font-size:1.1rem;font-weight:700;"></span>
    </div>
    <div id="panel-fullname" style="color:var(--muted);margin-top:4px;"></div>
  </div>

  <div id="panel-body">
    <!-- Dynamic content loaded by JS -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ==================== CONFIG ====================
const SUPABASE_URL = 'https://gmejqjfathciopglshqd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZWpxamZhdGhjaW9wZ2xzaHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTgxMDIsImV4cCI6MjA5MjEzNDEwMn0.ci90256_zc4ZQ6vvXRcGne37B8MA-yag3bzSC_TaFzA';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let map, markerStore = {}, currentPanelKey = null;
let adminSession = null;

// Initialize Map with Dark Theme
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: true }).setView([14.5886, 121.1753], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB',
    maxZoom: 19,
    className: 'dark-map'
  }).addTo(map);

  loadTerminals();
}

// Load terminals from Supabase
async function loadTerminals() {
  const { data, error } = await sb.from('todas_admin').select('*');
  if (error) { console.error(error); return; }

  data.forEach(t => {
    if (!t.lat || !t.lng) return;
    
    const color = t.status === 'confirmed' ? '#42A5F5' : 
                 t.status === 'kolorum' ? '#e53935' : '#F5C842';

    const marker = L.circleMarker([t.lat, t.lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(map);

    marker.toda = t;
    markerStore[t.id] = marker;

    marker.on('click', () => openPanel(t));
  });
}

function openPanel(toda) {
  currentPanelKey = toda.id;
  document.getElementById('panel-num').textContent = `#${toda.number || ''}`;
  document.getElementById('panel-name').textContent = toda.name || 'Unnamed TODA';
  document.getElementById('panel-fullname').textContent = toda.full_name || '';

  // Add more fields as needed
  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <div class="detail-row"><div class="detail-label">Status</div><div class="detail-value">${toda.status || 'Draft'}</div></div>
    <div class="detail-row"><div class="detail-label">Barangay</div><div class="detail-value">${toda.barangay || '—'}</div></div>
    <div class="detail-row"><div class="detail-label">Landmarks</div><div class="detail-value">${toda.landmarks || '—'}</div></div>
  `;
  
  document.getElementById('panel').style.display = 'flex';
}

document.getElementById('panel-close').onclick = () => {
  document.getElementById('panel').style.display = 'none';
};

// Admin Login (simple for now - use your Supabase auth)
async function openAdminModal() {
  const email = prompt("Admin Email:");
  const password = prompt("Password:");
  if (!email || !password) return;

  const { data, error } = await sb.auth.signInWithPassword({email, password});
  if (error) alert("Login failed");
  else alert("Admin logged in successfully!");
}

// Init
window.onload = () => {
  initMap();
};
</script>
</body>
</html>
