<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Project ATL — Antipolo TODA Map</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23C2410C'/%3E%3Ctext y='24' x='4' font-size='22'%3E🛺%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <style>
    :root {
      --accent: #F97316; --accent-d: #C2410C; --accent-l: #FB923C;
      --bg: #1c120a; --bg-mid: #26160c; --bg-light: #3a2212;
      --border: #6b3d1c; --text: #fff4e6; --muted: #d0a373;
      --confirmed: #42A5F5; --draft: #F5C842; --kolorum: #e53935;
      --topbar-h: 60px; --panel-w: 360px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* --- TOPBAR --- */
    #topbar { 
      position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); 
      background: var(--accent-d); display: flex; align-items: center; 
      padding: 0 16px; z-index: 1000; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; color: white; text-decoration: none; font-size: 1.2rem; }
    #menu-toggle { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

    /* --- MAP --- */
    #map { position: absolute; top: var(--topbar-h); bottom: 0; left: 0; right: 0; z-index: 1; }

    /* --- SEARCH --- */
    #search-bar { flex: 1; max-width: 500px; position: relative; }
    #search-input { 
      width: 100%; padding: 8px 16px; border-radius: 20px; border: none; 
      background: rgba(0,0,0,0.2); color: white; font-size: 0.9rem;
    }

    /* --- SLIDE PANEL (DESKTOP) --- */
    #panel {
      position: fixed; top: var(--topbar-h); right: -400px; bottom: 0; 
      width: var(--panel-w); background: var(--bg-mid); border-left: 1px solid var(--border);
      z-index: 999; transition: right 0.3s ease; display: flex; flex-direction: column;
    }
    #panel.open { right: 0; }

    /* --- MOBILE OVERRIDES --- */
    @media (max-width: 768px) {
      #panel {
        right: 0; bottom: -100%; top: auto; width: 100%; 
        height: 70vh; border-left: none; border-top: 2px solid var(--accent);
        border-radius: 20px 20px 0 0; transition: bottom 0.3s ease;
      }
      #panel.open { bottom: 0; }
      #search-bar { display: none; } /* Simplified for now */
    }

    /* PANEL CONTENT */
    .panel-header { padding: 20px; border-bottom: 1px solid var(--border); position: relative; }
    #panel-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
    .panel-body { padding: 20px; overflow-y: auto; flex: 1; }
    .toda-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; margin-bottom: 5px; }
    .label { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 15px; }

    /* MODALS */
    .modal { 
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
      z-index: 2000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content { 
      background: var(--bg-mid); padding: 30px; border-radius: 12px; 
      width: 100%; max-width: 400px; border: 1px solid var(--border); 
    }
  </style>
</head>
<body>

<div id="topbar">
  <button id="menu-toggle">☰</button>
  <a href="#" class="logo">Project ATL</a>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search TODA or area...">
  </div>
  <button id="admin-btn" style="margin-left:auto; background:none; border:1px solid rgba(255,255,255,0.3); color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Admin</button>
</div>

<div id="map"></div>

<div id="panel">
  <div class="panel-header">
    <button id="panel-close">✕</button>
    <div id="panel-status-tag" style="font-size:0.7rem; text-transform:uppercase; margin-bottom:5px;"></div>
    <h2 id="panel-name" class="toda-name">Select a Pin</h2>
  </div>
  <div class="panel-body">
    <div class="label">Terminal Type</div>
    <div id="panel-type">—</div>
    <div class="label">Main Route</div>
    <div id="panel-route">—</div>
    <div class="label">Landmarks</div>
    <div id="panel-landmarks">—</div>
  </div>
</div>

<div id="login-modal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:15px; font-family:'Syne';">Admin Login</h3>
    <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #444; color:white;">
    <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; background:#111; border:1px solid #444; color:white;">
    <button id="do-login" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; font-weight:bold; cursor:pointer;">Login</button>
    <button onclick="document.getElementById('login-modal').style.display='none'" style="width:100%; background:none; border:none; color:var(--muted); margin-top:10px; cursor:pointer;">Cancel</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // --- CONFIG ---
  // Replace these with your actual keys if they aren't working
  const SB_URL = "https://your-project.supabase.co"; 
  const SB_KEY = "your-anon-key";
  const supabase = exports.supabase.createClient(SB_URL, SB_KEY);

  // --- MAP INIT ---
  const map = L.map('map', { zoomControl: false }).setView([14.5845, 121.1755], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // --- UI LOGIC ---
  const panel = document.getElementById('panel');
  const pName = document.getElementById('panel-name');
  const pType = document.getElementById('panel-type');
  const pRoute = document.getElementById('panel-route');
  const pClose = document.getElementById('panel-close');

  function openPanel(data) {
    pName.innerText = data.name || "Unknown TODA";
    pType.innerText = data.terminal_type || "Standard";
    pRoute.innerText = data.route || "Not specified";
    panel.classList.add('open');
  }

  pClose.onclick = () => panel.classList.remove('open');

  // --- DATA LOADING ---
  async function loadTodas() {
    const { data, error } = await supabase.from('todas').select('*');
    if (error) return console.error(error);

    data.forEach(toda => {
      const marker = L.circleMarker([toda.lat, toda.lng], {
        radius: 8,
        fillColor: toda.status === 'confirmed' ? '#42A5F5' : '#F5C842',
        color: '#fff',
        weight: 2,
        fillOpacity: 1
      }).addTo(map);

      marker.on('click', () => openPanel(toda));
    });
  }

  // --- ADMIN LOGIC ---
  document.getElementById('admin-btn').onclick = () => {
    document.getElementById('login-modal').style.display = 'flex';
  };

  document.getElementById('do-login').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) alert("Login failed: " + error.message);
    else location.reload();
  };

  loadTodas();
</script>
</body>
</html>
